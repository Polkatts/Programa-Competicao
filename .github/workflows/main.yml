name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4 # Atualizado para v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Atualizado para v5 (mais estável)
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter watchdog

    - name: Build EXE
      run: |
        pyinstaller --noconsole --onefile --name "Organizador_Empresa" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # O ponto crucial da correção
      with:
        name: Organizador-Windows
        path: dist/Organizador_Empresa.exe
