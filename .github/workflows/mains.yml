name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter watchdog filetype

    - name: Build EXE
      run: |
        pyinstaller --noconsole --name "Organizador_Pro_V3" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Organizador-Windows-V3
        path: dist/Organizador_Pro_V3.exe
